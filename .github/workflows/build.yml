name: Build and Push glance-base

on:
  workflow_dispatch:
    inputs:
      glance_version:
        description: "Glance version tag (e.g. v0.7.0)"
        required: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/glance-base

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            GLANCE_VERSION=${{ inputs.glance_version }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ inputs.glance_version }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
